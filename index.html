<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Descarga la app</title>
  <script>
    const userAgent = navigator.userAgent || navigator.vendor;

    if (/android/i.test(userAgent)) {
      window.location.href = "https://play.google.com/store/apps/details?id=com.chillngo.tourist&pcampaignid=web_share";
    } else if (/iPad|iPhone|iPod/.test(userAgent)) {
      window.location.href = "https://apps.apple.com/mx/app/chill-n-go-tours/id6760919549";
    } else {
      // Desktop: puedes poner tu web o cualquier link
      window.location.href = "https://play.google.com/store/apps/details?id=com.chillngo.tourist&pcampaignid=web_share";
    }
  </script>
</head>
<body>
  <p>Redirigiendo a la tienda...</p>
</body>
</html>
